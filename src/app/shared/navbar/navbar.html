<header class="navbar">
  <a class="logo" routerLink="/" (click)="closeMenu()">Johnnie C. Johnson Jr.</a>
  <span class="nav-divider" aria-hidden="true"></span>
  <button
    type="button"
    class="nav-toggle"
    aria-label="Toggle navigation"
    [attr.aria-expanded]="menuOpen()"
    (click)="toggleMenu()"
  >
    <span></span><span></span><span></span>
  </button>
  <nav class="nav-links" [class.open]="menuOpen()">
    <a routerLink="/story" routerLinkActive="active" (click)="closeMenu()">The Story</a>
    <a routerLink="/collection" routerLinkActive="active" (click)="closeMenu()">The Collection</a>
    <a href="#">News</a>
    <a routerLink="/contact" routerLinkActive="active" (click)="closeMenu()">Contact</a>
  </nav>
</header>
