<main class="contact-page">

  <section class="contact-header">
    <h1>Contact Me</h1>
    <div class="ornament" aria-hidden="true"><span></span><i>&#10022;</i><span></span></div>
  </section>

  <section class="contact-body">
    <div class="contact-info">

      <div class="contact-item">
        <p class="contact-label">Mail</p>
        <p class="contact-value">P. O. Box 1583, DeSoto, Texas 75123,<br>United States.</p>
      </div>

      <div class="contact-item">
        <p class="contact-label">Phone</p>
        <p class="contact-value"><a href="tel:12144483575">214-448-3575</a></p>
      </div>

      <div class="contact-item">
        <p class="contact-label">Email</p>
        <p class="contact-value"><a href="mailto:johnnie@johnniecjohnson.com">johnnie@johnniecjohnson.com</a></p>
      </div>

      <div class="contact-item">
        <p class="contact-label">Follow Me</p>
        <div class="social-icons">
          <a href="#" class="social-icon" aria-label="Facebook">
            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M13.5 21v-8.06h2.7l.4-3.14h-3.1V7.9c0-.91.25-1.53 1.56-1.53h1.67V3.56A22.4 22.4 0 0 0 14.35 3.4c-2.4 0-4.05 1.47-4.05 4.16v2.34H7.6v3.14h2.7V21h3.2z"/></svg>
          </a>
          <a href="#" class="social-icon" aria-label="Instagram">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4.2"/><circle cx="17.4" cy="6.6" r="1.1" fill="currentColor" stroke="none"/></svg>
          </a>
          <a href="#" class="social-icon" aria-label="X (Twitter)">
            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M3.5 3h4.4l4 5.6L16.7 3h3.1l-6.1 7.6L20.5 21h-4.4l-4.4-6.1L6.5 21H3.4l6.5-8.1L3.5 3z"/></svg>
          </a>
          <a href="#" class="social-icon" aria-label="YouTube">
            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M21.6 7.9a2.8 2.8 0 0 0-2-2C17.9 5.5 12 5.5 12 5.5s-5.9 0-7.6.4a2.8 2.8 0 0 0-2 2A29 29 0 0 0 2 12a29 29 0 0 0 .4 4.1 2.8 2.8 0 0 0 2 2c1.7.4 7.6.4 7.6.4s5.9 0 7.6-.4a2.8 2.8 0 0 0 2-2A29 29 0 0 0 22 12a29 29 0 0 0-.4-4.1zM10 15.2V8.8l5.5 3.2-5.5 3.2z"/></svg>
          </a>
        </div>
      </div>

    </div>

    <div class="contact-divider" aria-hidden="true"></div>

    <form class="contact-form" (submit)="onSubmit($event)">
      <label>
        <span>Name</span>
        <input type="text" name="name" required>
      </label>

      <label>
        <span>Email</span>
        <input type="email" name="email" required>
      </label>

      <label>
        <span>Subject</span>
        <input type="text" name="subject">
      </label>

      <label>
        <span>Message</span>
        <textarea name="message" rows="6" required></textarea>
      </label>

      <button type="submit" class="cta" [disabled]="sending()">{{ sending() ? 'Sending…' : 'Send Message' }} <span class="arrow">&rarr;</span></button>

      <p class="form-note" aria-live="polite">{{ formNote() }}</p>
    </form>
  </section>

</main>
